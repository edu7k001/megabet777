<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fortune Tiger • MEGABET777</title><link rel="stylesheet" href="/assets/games.css"></head><body><header class="game-topbar"><div class="brand">MEGA<b>BET777</b></div><div class="top-actions"><div class="balance-pill" data-balance>R$ 0,00</div><button class="icon-btn" onclick="location.href='/dashboard.html'">⌂</button></div></header><main class="game-shell"><section class="game-card"><div class="game-hero"><div><h1 class="game-title">🐯 Fortune Tiger</h1><p class="game-subtitle">Slot original 3×3 com animações rápidas e resultado processado no servidor.</p></div><span class="badge">RTP configurável</span></div><div class="stage"><div class="reels" id="reels"><div class="reel"><div class="symbol">❔</div><div class="symbol">❔</div><div class="symbol">❔</div></div><div class="reel"><div class="symbol">❔</div><div class="symbol">❔</div><div class="symbol">❔</div></div><div class="reel"><div class="symbol">❔</div><div class="symbol">❔</div><div class="symbol">❔</div></div></div></div><div class="control-panel"><div class="bet-box"><button id="minus">−</button><input id="bet" type="number" min="5" step="5" value="10"><button id="plus">+</button></div><button class="primary-btn" id="spin">GIRAR</button></div><div class="message" data-message>Escolha o valor e toque em girar.</div></section></main><script src="/assets/game-common.js"></script><script>MBGame.require();MBGame.balance();const symbols=["🐯", "🪙", "🧧", "🍊", "💰", "🏮"];const bet=document.querySelector('#bet'),btn=document.querySelector('#spin'),reels=[...document.querySelectorAll('.reel')];document.querySelector('#minus').onclick=()=>bet.value=Math.max(5,Number(bet.value)-5);document.querySelector('#plus').onclick=()=>bet.value=Number(bet.value)+5;function randomize(){document.querySelectorAll('.symbol').forEach(e=>e.textContent=symbols[Math.floor(Math.random()*symbols.length)])}let timer;btn.onclick=async()=>{const amount=Number(bet.value);if(amount<5)return MBGame.setMessage('Aposta mínima de R$ 5,00','lose');btn.disabled=true;reels.forEach(r=>r.classList.add('spinning'));timer=setInterval(randomize,80);MBGame.setMessage('Girando...');try{const d=await MBGame.json('/api/game/slot',{method:'POST',body:JSON.stringify({userId:MBGame.user.id,betAmount:amount,game:'fortune-tiger'})});await new Promise(r=>setTimeout(r,850));clearInterval(timer);reels.forEach(r=>r.classList.remove('spinning'));d.grid.flat().forEach((v,i)=>document.querySelectorAll('.symbol')[i].textContent=v);if(d.winAmount>0){document.querySelectorAll('.symbol').forEach(e=>e.classList.add('winning'));MBGame.setMessage('Você ganhou '+MBGame.money(d.winAmount)+'!','win');MBGame.confetti()}else MBGame.setMessage('Não foi desta vez. Cashback registrado.','lose');await MBGame.balance()}catch(e){clearInterval(timer);reels.forEach(r=>r.classList.remove('spinning'));MBGame.setMessage(e.message,'lose')}finally{btn.disabled=false;setTimeout(()=>document.querySelectorAll('.symbol').forEach(e=>e.classList.remove('winning')),2200)}};</script></body></html>
